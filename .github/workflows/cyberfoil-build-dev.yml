name: Build CyberFoil (development)

on:
  push:
    branches:
      - development
  workflow_dispatch: 
  pull_request:
    branches:
      - development

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: devkitpro/devkita64:latest

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Download prebuilt lib.a from CyberFoil_Blob release
        shell: bash
        env:
          BLOB_REPO_TOKEN: ${{ secrets.BLOB_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${BLOB_REPO_TOKEN:-}" ]; then
            echo "WARNING: Missing secret BLOB_REPO_TOKEN; continuing without prebuilt/lib.a"
            exit 0
          fi

          owner="${GITHUB_REPOSITORY_OWNER}"
          blob_repo="CyberFoil_Blob"
          asset_name="lib.a"
          api_release="https://api.github.com/repos/${owner}/${blob_repo}/releases/latest"

          release_json="$(curl -fsSL \
            -H "Authorization: Bearer ${BLOB_REPO_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api_release}")"

          asset_id="$(python3 -c 'import json,sys; d=json.load(sys.stdin); n="lib.a"; print(next((str(a["id"]) for a in d.get("assets",[]) if a.get("name")==n), ""))' <<< "${release_json}")"
          if [ -z "${asset_id}" ]; then
            echo "WARNING: Asset ${asset_name} not found in latest ${blob_repo} release; continuing without prebuilt/lib.a"
            exit 0
          fi

          mkdir -p prebuilt
          curl -fsSL -L \
            -H "Authorization: Bearer ${BLOB_REPO_TOKEN}" \
            -H "Accept: application/octet-stream" \
            "https://api.github.com/repos/${owner}/${blob_repo}/releases/assets/${asset_id}" \
            -o prebuilt/lib.a

          if [ ! -s prebuilt/lib.a ]; then
            echo "WARNING: Downloaded prebuilt/lib.a is missing or empty; continuing without prebuilt/lib.a"
            rm -f prebuilt/lib.a
          fi

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          start_ts=$(date +%s)
          dkp-pacman -S --noconfirm --needed switch-ntfs-3g switch-lwext4
          make -j"$(nproc)"

          end_ts=$(date +%s)
          duration=$((end_ts - start_ts))

          if [ -f "./cyberfoil.nro" ]; then
            nro_status="present"
            nro_size=$(stat -c%s "./cyberfoil.nro" 2>/dev/null || stat -f%z "./cyberfoil.nro")
          else
            nro_status="missing"
            nro_size="0"
          fi

          {
            echo "## Build Summary"
            echo "- Commit: ${GITHUB_SHA}"
            echo "- Runner: $(uname -a)"
            echo "- Duration: ${duration}s"
            echo "- Output: cyberfoil.nro (${nro_status}, ${nro_size} bytes)"
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload cyberfoil.nro artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyberfoil-dev-nro
          path: ./cyberfoil.nro
          if-no-files-found: error
